custom_palette=false
icon_theme=Nordzy-cyan-dark--light_panel
standard_dialogs=gtk3
style=kvantum

[Fonts]
fixed="Noto Sans,12,-1,5,50,0,0,0,0,0"
general="Noto Sans,12,-1,5,50,0,0,0,0,0"

[Interface]
